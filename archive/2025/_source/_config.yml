markdown: kramdown
highlighter: rouge
# paginate: 10
permalink: /:categories/:year/:month/:day/:title/

name: Chimeces
url: http://chimeces.com
baseurl: /archive/2025

kramdown:
  input: GFM
  hard_wrap: false

redcarpet:
  extensions: [fenced_code_blocks, tables, autolink, no_intra_emphasis, strikethrough]

exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - README.md
  - package.json
  - package-lock.json
  - vendor
